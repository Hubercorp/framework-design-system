name: Deploy Ghost Theme

on:
  push:
    branches:
      - main
    paths:
      - "theme/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: theme

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create theme ZIP
        run: |
          zip -r ../theme.zip . \
            -x "*.git*" \
            -x "node_modules/*"

      - name: Upload to Ghost
        env:
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
        run: |
          curl \
            -X POST \
            -H "Authorization: Ghost $GHOST_ADMIN_API_KEY" \
            -F "file=@../theme.zip" \
            "$GHOST_ADMIN_URL/api/admin/themes/upload/"
