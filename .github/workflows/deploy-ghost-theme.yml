name: Deploy Ghost theme

on:
  push:
    branches:
      - main
    paths:
      - "theme/**"
      - ".github/workflows/deploy-ghost-theme.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ghost-theme-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        env:
          GHOST_ADMIN_API_URL: ${{ secrets.GHOST_ADMIN_API_URL }}
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
        run: |
          set -euo pipefail

          API_URL="${GHOST_ADMIN_API_URL:-${GHOST_ADMIN_URL:-}}"

          if [ -z "$API_URL" ]; then
            echo "❌ Missing secret GHOST_ADMIN_API_URL"
            exit 1
          fi

          if [ -z "$GHOST_ADMIN_API_KEY" ]; then
            echo "❌ Missing secret GHOST_ADMIN_API_KEY"
            exit 1
          fi

          case "$API_URL" in
            https://*) ;;
            *)
              echo "❌ Ghost Admin API URL must use HTTPS."
              exit 1
              ;;
          esac

          echo "✅ Secrets OK"

      - name: Fetch high-resolution PNG mascot
        shell: bash
        run: bash theme/scripts/fetch-brand-assets.sh

      - name: Deploy theme through Ghost Admin API
        uses: TryGhost/action-deploy-theme@v1.6.6
        with:
          api-url: ${{ secrets.GHOST_ADMIN_API_URL || secrets.GHOST_ADMIN_URL }}
          api-key: ${{ secrets.GHOST_ADMIN_API_KEY }}

          # dossier contenant le thème
          working-directory: theme

          # nom EXACT du thème actuellement actif dans Ghost
          theme-name: the-liege-data-hub-ghost-theme-v2.4.8

          exclude: |
            .git
            .github
            README.md
            node_modules
            scripts
